server {
    port = 8948
    port = ${?PROXY_PORT}
}

upstream {
    baseUrl = "https://litellm.labs.jb.gg"
    baseUrl = ${?UPSTREAM_BASE_URL}

    apiKey = ""
    apiKey = ${?UPSTREAM_API_KEY}

    defaultModel = "hetzner/zai-org/GLM-5.2-FP8"
    defaultModel = ${?UPSTREAM_DEFAULT_MODEL}

    timeoutSeconds = 300
    timeoutSeconds = ${?UPSTREAM_TIMEOUT_SECONDS}
}

debug {
    # Log every incoming HTTP request after it completes as "METHOD path -> status"
    # (including 404s for unknown endpoints). On by default.
    logRequests = true
    logRequests = ${?PROXY_DEBUG_LOG_REQUESTS}

    # Log the raw JSON bodies being proxied: ">>> upstream <json>" (sent to upstream)
    # and "<<< downstream <json>" (received from upstream). Off by default.
    logBodies = false
    logBodies = ${?PROXY_DEBUG_LOG_BODIES}
}

# Requests carrying Anthropic server-side tools that GLM can't satisfy
# (web_search, computer, text_editor, bash) are forwarded raw — no OpenAI
# translation — to the upstream's Anthropic /v1/messages endpoint, using a
# model that supports them. Reuses upstream baseUrl + apiKey.
anthropic {
    enabled = true
    enabled = ${?ANTHROPIC_ROUTING_ENABLED}

    # Model used for forwarded requests. anthropic/claude-opus-4-6 supports web_search.
    model = "anthropic/claude-opus-4-6"
    model = ${?ANTHROPIC_ROUTING_MODEL}

    # Tool "type" prefixes that trigger the Anthropic path. Matched by prefix
    # so dated variants (web_search_20250305, computer_20250124) are covered.
    toolTypes = ["web_search", "computer", "text_editor", "bash"]
}

